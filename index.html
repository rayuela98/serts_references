<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>References</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #ffffff;
      --text: #111111;
      --muted: #666666;
      --card: #f5f5f5;
      --border: #e5e5e5;
      --link: #0a66cc;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111111;
        --text: #f3f3f3;
        --muted: #b5b5b5;
        --card: #1a1a1a;
        --border: #2c2c2c;
        --link: #7db7ff;
      }
    }

    * {
      box-sizing: border-box;
    }

    html {
      font-size: 16px;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      line-height: 1.65;
      word-wrap: break-word;
    }

    .wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 24px 18px 56px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.7rem, 4vw, 2.4rem);
      line-height: 1.15;
    }

    h2 {
      margin: 0 0 10px;
      font-size: 1rem;
      line-height: 1.25;
    }

    .subtitle {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .meta {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .file-links {
      margin: 18px 0 8px;
      padding: 14px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    .file-links a {
      display: inline-block;
      margin: 4px 0;
      color: var(--link);
      text-decoration: none;
      overflow-wrap: anywhere;
    }

    .file-links a:hover {
      text-decoration: underline;
    }

    .refs {
      margin-top: 18px;
    }

    .refs p,
    .refs div.csl-entry,
    .refs li {
      margin: 0 0 1rem;
    }

    .refs a {
      color: var(--link);
      text-decoration: none;
      overflow-wrap: anywhere;
    }

    .refs a:hover {
      text-decoration: underline;
    }

    .refs .csl-entry {
      padding: 0.85rem 0;
      border-bottom: 1px solid var(--border);
    }

    .refs .csl-entry:last-child {
      border-bottom: none;
    }

    footer {
      margin-top: 22px;
      color: var(--muted);
      font-size: 0.88rem;
    }

    @media (max-width: 520px) {
      .wrap {
        padding: 14px 12px 36px;
      }

      .card {
        padding: 16px;
        border-radius: 12px;
      }

      body {
        line-height: 1.55;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>References</h1>
      <p class="subtitle">Sources used in this project.</p>
      <p class="meta">Last updated: 2026-03-15</p>

      <div class="file-links">
        <h2>Project files</h2>
        <a href="https://github.com/rayuela98/serts_references/blob/main/model.py" target="_blank" rel="noopener noreferrer">model.py</a><br>
        <a href="https://github.com/rayuela98/serts_references/blob/main/discretescenariovalues.py" target="_blank" rel="noopener noreferrer">discretescenariovalues.py</a>
      </div>

      <div class="refs">
        <div class="csl-bib-body" style="line-height: 2; margin-left: 2em; text-indent:-2em;">
          <!-- Paste your Zotero bibliography entries here -->
        </div>
      </div>

      <footer>
        Compiled with Zotero.
      </footer>
    </section>
  </main>
</body>
</html>
